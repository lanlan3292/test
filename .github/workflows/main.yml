name: Monthly Nightly Unified Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # 每月 1 日 UTC 00:00

permissions:
  contents: write

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compare branch heads against latest Nightly release
        id: check
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          LATEST_RELEASE_TAG=$(gh release list --limit 100 --json tagName,publishedAt -q '. | map(select(.tagName | startswith("Nightly-"))) | sort_by(.publishedAt // "") | reverse | .[0].tagName' || true)
          if [ -z "$LATEST_RELEASE_TAG" ]; then
            echo "INFO: No Nightly release found. Proceeding with workflow."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "INFO: Latest Nightly release tag: $LATEST_RELEASE_TAG"
          BODY=$(gh api repos/"$GITHUB_REPOSITORY"/releases/tags/"$LATEST_RELEASE_TAG" -q .body 2>/dev/null || gh release view "$LATEST_RELEASE_TAG" --json body -q .body || true)
          if [ -z "$BODY" ]; then
            echo "WARNING: Unable to retrieve latest release body. Proceeding with workflow."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_BRANCHES=("main" "main-extra/pure-glass" "main-extra/C.R.I" "main-extra/april-fool")
          MATRIX_LABELS=("Main" "Main Extra Pure Glass" "Main Extra Crop Ready Indicator" "Main Extra April Fool")
          ALL_MATCH="true"

          for i in "${!MATRIX_BRANCHES[@]}"; do
            BRANCH="${MATRIX_BRANCHES[$i]}"
            LABEL="${MATRIX_LABELS[$i]}"

            PREV_COMMIT=$(printf '%s' "$BODY" | sed -n "/<!-- ${LABEL// /_}_ANCHOR -->/,/---/p" | grep -oP '(?<=- \*\*Last Commit\*\*: )[0-9a-f]+' | head -n 1 || true)
            if [ -z "$PREV_COMMIT" ]; then
              PREV_COMMIT=$(printf '%s' "$BODY" | awk -v label="$LABEL" '
                /^### Branch: / {
                  if ($0 == "### Branch: " label) found=1;
                  else found=0;
                }
                found && match($0, /- \*\*Last Commit\*\*: [0-9a-f]+/) {
                  m = substr($0, RSTART, RLENGTH);
                  sub(/- \*\*Last Commit\*\*: /, "", m);
                  print m;
                  exit;
                }
              ' || true)
            fi

            if [ -z "$PREV_COMMIT" ]; then
              echo "WARNING: Could not determine previous commit for matrix branch '$BRANCH'. Proceeding with workflow."
              ALL_MATCH="false"
              break
            fi

            BRANCH_COMMIT=$(git ls-remote --heads origin "refs/heads/$BRANCH" | cut -f1)
            if [ -z "$BRANCH_COMMIT" ]; then
              echo "WARNING: Matrix branch '$BRANCH' not found on origin. Proceeding with workflow."
              ALL_MATCH="false"
              break
            fi

            if [ "$BRANCH_COMMIT" != "$PREV_COMMIT" ]; then
              echo "INFO: Branch '$BRANCH' advanced from $PREV_COMMIT to $BRANCH_COMMIT. Proceeding with workflow."
              ALL_MATCH="false"
              break
            fi
          done

          if [ "$ALL_MATCH" = "true" ]; then
            echo "INFO: All matrix branches still match their last release commits. Skipping workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "INFO: At least one matrix branch changed since the last release. Proceeding with workflow."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: precheck
    if: needs.precheck.outputs.skip != 'true'
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        include:
          - branch: main
            label: Main
            filename: lRP-Main

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Process Release (ZIP + Replace Notes)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.MODRINTH_GITHUB_TOKEN }}
        run: |
          set -e

          FULL_DATE_MS=$(date +'%Y-%m-%d-%H%M%S-%3N')
          COMMIT=$(git rev-parse --short HEAD)
          RELEASE_TAG="Nightly-$(date +'%Y-%m-%d-%H')-Build-${{ github.run_number }}"
          ZIP_NAME="${{ matrix.filename }}.zip"
          BRANCH_LABEL="${{ matrix.label }}"
          ANCHOR="<!-- ${BRANCH_LABEL// /_}_ANCHOR -->"

          echo "INFO: Generating ZIP: $ZIP_NAME"
          zip -r -q "$ZIP_NAME" . -x ".git/*" -x "*.zip" -x ".github/*" -x "*.psd" -x "*.bak" -x "*备用*" -x "*副本*"
          if [ ! -f "$ZIP_NAME" ]; then
            echo "FAILED: ZIP file not created"
            exit 1
          fi

          # 1. 确保 Release 存在（Prerelease）
          set +e
          gh release view "$RELEASE_TAG" >/dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "INFO: Creating new prerelease: $RELEASE_TAG"
            gh release create "$RELEASE_TAG" \
              --title "Nightly Build #${{ github.run_number }} ($FULL_DATE_MS)" \
              --notes "Initial Nightly Build" \
              --prerelease
            sleep 2
          fi
          set -e

          # 2. 上传 ZIP（覆盖同名文件）
          gh release upload "$RELEASE_TAG" "$ZIP_NAME" --clobber

          # 3. 获取当前 Body 内容
          FINAL_NOTES=$(mktemp)
          # 获取当前 Release 页面已有的文字
          gh release view "$RELEASE_TAG" --json body -q .body > "$FINAL_NOTES"

          # 4. (已废弃旧的清理逻辑，保持新 Build 页面整洁)

          # 5. 生成本分支 Changelog：仅包含自上次 Nightly Pre-Release 之后的新提交
          # 遍历最近的 Nightly releases，寻找包含本分支 ANCHOR 的最近一次（按发布时间倒序）
          RELEASE_LIST=$(gh release list --limit 100 --json tagName,publishedAt -q '. | map(select(.tagName | startswith("Nightly-"))) | sort_by(.publishedAt // "") | reverse | .[].tagName')
          PREV_COMMIT=""
          PREV_RELEASE=""
          FALLBACK_NOTE=""

          ANCHOR_ESCAPED=$(printf '%s' "$ANCHOR" | sed 's/[\/&]/\\&/g')
          while IFS= read -r R; do
            # 跳过当前正在创建的 release
            if [ "$R" = "$RELEASE_TAG" ]; then
              continue
            fi
            # 使用 gh api 获取 release body（按 tag），返回原始多行文本，避免 JSON 转义导致的匹配失败
            BODY=$(gh api repos/"$GITHUB_REPOSITORY"/releases/tags/"$R" -q .body || gh release view "$R" --json body -q .body || true)
            # 先尝试用 ANCHOR 定位本分支段落
            SECTION=$(printf '%s' "$BODY" | sed -n "/$ANCHOR_ESCAPED/,/---/p" )
            PREV_COMMIT_CAND=$(echo "$SECTION" | grep -oP '(?<=- \*\*Last Commit\*\*: )[0-9a-f]+' | head -n 1 || true)
            # 若未命中 ANCHOR 区域，再尝试匹配 "### Branch: $BRANCH_LABEL" 段落
            if [ -z "$PREV_COMMIT_CAND" ]; then
              BRANCH_ESCAPED=$(printf '%s' "$BRANCH_LABEL" | sed 's/[\/&]/\\&/g')
              SECTION=$(printf '%s' "$BODY" | sed -n "/^### Branch: $BRANCH_ESCAPED/,/---/p")
              PREV_COMMIT_CAND=$(echo "$SECTION" | grep -oP '(?<=- \*\*Last Commit\*\*: )[0-9a-f]+' | head -n 1 || true)
            fi
            if [ -n "$PREV_COMMIT_CAND" ]; then
              PREV_COMMIT="$PREV_COMMIT_CAND"
              PREV_RELEASE="$R"
              echo "INFO: Found previous Nightly release $PREV_RELEASE with commit $PREV_COMMIT for branch $BRANCH_LABEL"
              break
            fi
          done <<< "$RELEASE_LIST"

          if [ -n "$PREV_COMMIT" ]; then
            RAW_LOG=$(git log --pretty=format:"%h - %s" "$PREV_COMMIT"..HEAD | head -n 50 || true)
            if [ -z "$RAW_LOG" ]; then
              RAW_LOG="No new changes since previous Nightly ($PREV_RELEASE)."
            else
              TOTAL_LINES=$(git log --pretty=format:"%h" "$PREV_COMMIT"..HEAD | wc -l || true)
              [ "$TOTAL_LINES" -gt 50 ] && RAW_LOG="$RAW_LOG"$'\n'"... and $((TOTAL_LINES - 50)) more changes."
            fi
          else
            # 未找到任何包含本分支 ANCHOR 的 Nightly：回退到按最近 1 个月的提交（将在 Changelog 尾部标注）
            RAW_LOG=$(git log --pretty=format:"%h - %s" --since="1 month ago" | head -n 50 || true)
            if [ -z "$RAW_LOG" ]; then
              RAW_LOG="No changes in the last month."
            else
              TOTAL_LINES=$(git log --pretty=format:"%h" --since="1 month ago" | wc -l || true)
              [ "$TOTAL_LINES" -gt 50 ] && RAW_LOG="$RAW_LOG"$'\n'"... and $((TOTAL_LINES - 50)) more changes."
            fi
            FALLBACK_NOTE="- **Note**: Showing changes from the last 1 month because no previous Nightly release (for this branch) was found."
          fi

          # 6. 追加新日志到 FINAL_NOTES
          if [ -n "$PREV_RELEASE" ]; then
            SINCE_LINE="- **Since**: $PREV_RELEASE"
          else
            SINCE_LINE=""
          fi
          {
            echo -e "\n$ANCHOR"
            echo "### Branch: $BRANCH_LABEL"
            echo "- **Last Build**: $FULL_DATE_MS"
            echo "- **Last Commit**: $COMMIT"
            [ -n "$SINCE_LINE" ] && echo "$SINCE_LINE"
            echo "- **Changelog:**"
            echo "$RAW_LOG" | sed 's/^/  /'
            # 如果使用了回退日志，尾部标注说明
            [ -n "$FALLBACK_NOTE" ] && echo "" && echo "  $FALLBACK_NOTE"
            echo -e "\n---"
          } >> "$FINAL_NOTES"

          # 7. 更新 Release notes 页面
          gh release edit "$RELEASE_TAG" --notes-file "$FINAL_NOTES" --prerelease

          # 清理临时文件
          rm -f "$FINAL_NOTES"